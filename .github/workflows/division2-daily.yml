name: Division 2 Daily Reset

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DIVISION2_URL: https://hi-dep.github.io/division2/?view=event&lang=en
          EVENT_INDEX_URL: https://hi-dep.github.io/division2/data/event/index.json
          EMBED_FOOTER: Escalation Target Loot
          EMBED_USERNAME: Escalation Target Loot
        run: |
          python division2_daily.py
